# ============================================
# Core Settings
# ============================================

# Use C-a as prefix
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Start windows and panes at 1 instead of 0
set -g base-index 1
set -g pane-base-index 1

# Vi mode everywhere
set -g mode-keys vi
set -g status-keys vi
setw -g mode-keys vi


# allow-passthrough (notifications etc.) — requires tmux 3.3+
if -F '#{>=:#{version},3.3}' 'set -g allow-passthrough on'

# extended-keys (Shift+Enter etc.)
set -s extended-keys on
set -as terminal-features "xterm*:extkeys"

# Pass along focus events for claude
set -g focus-events on


# ============================================
# Key Bindings
# ============================================

# (r) Reload config
bind -N "Reload the tmux configuration" r source-file "#{s|/[^/]*$||:#{config_files}}/tmux.conf"

# ============================================
# Terminal & Clipboard
# ============================================

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
# Also support XTERM=xterm-kitty|xterm-ghostty|alacritty|wezterm
set -ga terminal-overrides ",xterm-ghostty:Tc"
set -ga terminal-overrides ",alacritty:Tc"
set -ga terminal-overrides ",wezterm:Tc"
set -ga terminal-overrides ",xterm-kitty:Tc"

# Reasonable escape timeout (allows Alt keys to work) to minimize delay
set -sg escape-time 30

# OSC 52 clipboard support both for tmux and vim inside tmux
set -g set-clipboard on

# ============================================
# Status Bar
# ============================================

set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left

# Colors
set -g status-style bg=colour235,fg=colour250
set -g status-left-style bg=colour235,fg=colour250
set -g status-right-style bg=colour235,fg=colour250

# Left side: Session name + prefix indicator
set -g status-left-length 40
set -g status-left '#[fg=colour235,bg=colour39,bold] #S #[fg=colour39,bg=colour235]#[default]'

# Window list
setw -g window-status-format '#[fg=colour235,bg=colour238]#[fg=colour250,bg=colour238] #I:#W #[fg=colour238,bg=colour235]'
setw -g window-status-current-format '#[fg=colour235,bg=colour39]#[fg=colour235,bg=colour39,bold] #I:#W #[fg=colour39,bg=colour235]'
setw -g window-status-separator ''

# Right side: Hostname + time
set -g status-right-length 60
set -g status-right '#{?client_prefix,#[fg=colour39]#[bold]PREFIX #[nobold],}#[fg=colour238,bg=colour235]#[fg=colour250,bg=colour238] %Y-%m-%d %H:%M #[fg=colour39,bg=colour238]#[fg=colour235,bg=colour39,bold] #h '

# ============================================
# Copy Mode (Vi bindings)
# ============================================

# (v) Start selection
bind-key -N "Start copy selection" -T copy-mode-vi v send-keys -X begin-selection

# (y) Copy selection
bind-key -N "Copy selection to clipboard" -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard > /dev/null"

# ============================================
# Pane Splitting
# ============================================

unbind -
unbind /

# (-) Vertical split
bind-key -N "Split window vertically" - split-window -v -c "#{pane_current_path}"

# (/) Horizontal split
bind-key -N "Split window horizontally" / split-window -h -c "#{pane_current_path}"
# Add 'C-' variant for less key-up strictness
# NOTE : 'C-_' is actually CTRL+/
bind-key -N "Split window horizontally (copy of /)" C-_ split-window -h -c "#{pane_current_path}"


# ============================================
# Window helpers
# ============================================

# Add 'C-' variants for panel swapping for less key-up strictness
# (C-n) Cycle forward windows
bind-key -N "Select the next window (copy of n)" C-n next-window

# (C-p) Cycle backward windows
bind-key -N "Select the previous window (copy of p)" C-p previous-window


# ============================================
# Pain helpers
# ============================================

# (k) Move up one pane
bind-key -N "Select the pane above the active pane (copy of Up)" k select-pane -U
# Add 'C-' variants for panel swapping for less key-up strictness
bind-key -N "Select the pane above the active pane (copy of k)" C-k select-pane -U

# (j) Move down one pane
bind-key -N "Select the pane below the active pane" j select-pane -D
# Add 'C-' variants for panel swapping for less key-up strictness
bind-key -N "Select the pane below the active pane" C-j select-pane -D

# (l) Move left one pane
unbind l
bind-key -N "Select the pane to the left of the active pane" l select-pane -L
# Add 'C-' variants for panel swapping for less key-up strictness
bind-key -N "Select the pane to the left of the active pane" C-l select-pane -L

# (h) Move right one pane
bind-key -N "Select the pane to the right of the active pane" h select-pane -R
# Add 'C-' variants for panel swapping for less key-up strictness
bind-key -N "Select the pane to the right of the active pane" C-h select-pane -R

# ============================================
# Local Overrides
# ============================================

# Source local.conf if present (gitignored, created by install.sh).
# Use for machine-specific tweaks (clipboard commands, fonts, etc.)
source-file -q "#{s|/[^/]*$||:#{config_files}}/local.conf"
